appId: com.incitertech.activitytracker
productName: Activity Tracker

publish:
  provider: github
  owner: MohsinGhani
  repo: activity-tracker

directories:
  output: release

files:
  - main.js
  - preload.js
  - index.html
  - renderer.js
  - styles.css
  - firebase.js
  - cloudinary.js
  - config.js
  - assets/**
  - package.json
  - node_modules/**

asar: true
npmRebuild: false
buildDependenciesFromSource: false

win:
  target:
    - nsis
  icon: assets/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

mac:
  target:
    - dmg
    - zip
  icon: assets/icon.icns
  # Hardened runtime enforces library validation, which makes the app refuse to
  # spawn/load the ad-hoc-signed active-win native helper (node_modules/active-win/main
  # and its Swift dylibs) — breaking active-app/window detection ("Unknown activity").
  # For ad-hoc / non-notarized builds it must be off. If you later notarize with a
  # real Developer ID, set this back to true AND add an entitlements plist granting
  # com.apple.security.cs.disable-library-validation (+ entitlementsInherit) so the
  # helper can still load.
  hardenedRuntime: false

linux:
  target:
    - AppImage
    - deb
  icon: assets/icon.png
  category: Utility
