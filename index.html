<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
    CSP:
    - script-src: self + Firebase CDN (gstatic.com)
    - connect-src: all HTTPS + WSS (Firebase, Cloudinary)
    - img-src:     self + data: URIs (screenshots) + https
  -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
      default-src 'self';
      script-src  'self' https://www.gstatic.com;
      connect-src https: wss:;
      style-src   'self' 'unsafe-inline';
      img-src     'self' data: https:;
    "
    />
    <title>Team Tracker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- ─── Login View ──────────────────────────────────────────── -->
    <div id="login-view" class="view active">
      <div class="card">
        <div class="brand">
          <div class="brand-icon">
            <img
              src="assets/icon.png"
              alt="Logo"
              style="width: 100%; height: 100%; object-fit: contain"
            />
          </div>
          <h1 class="brand-title">Team Tracker</h1>
          <p class="brand-sub">Sign in to start monitoring</p>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            placeholder="you@company.com"
            autocomplete="email"
            spellcheck="false"
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            placeholder="••••••••"
            autocomplete="current-password"
          />
        </div>

        <p id="login-error" class="error-msg" aria-live="polite"></p>

        <button id="login-btn" class="btn btn-primary">Login</button>
      </div>
    </div>

    <!-- ─── Dashboard View ──────────────────────────────────────── -->
    <div id="dashboard-view" class="view">
      <div class="dash-header">
        <div>
          <p class="dash-label">Logged in as</p>
          <p id="welcome-msg" class="dash-email">—</p>
        </div>
        <button id="logout-btn" class="btn btn-ghost">Logout</button>
      </div>

      <div class="timer-card">
        <p class="timer-label">Session Duration</p>
        <div id="timer-display" class="timer-value">00h 00m 00s</div>
        <p id="status-text" class="status-text">No active session</p>
      </div>

      <div class="controls">
        <button id="start-btn" class="btn btn-success">
          &#9654; Start Session
        </button>
        <button id="stop-btn" class="btn btn-danger" disabled>
          &#9632; Stop Session
        </button>
      </div>
    </div>

    <!-- ─── Toast Area (fixed, above both views) ────────────────── -->
    <div id="toast-area" class="toast-area" aria-live="polite"></div>

    <script type="module" src="renderer.js"></script>
  </body>
</html>
